<div class="card-wrapper" id="card-{{ experience.id }}" [class.visible]="isVisible">
  <div class="card-inner">
    <div class="card-front" [style.--card-color]="experience.color">
      <div class="card-icon">{{ experience.icon }}</div>
      <h3 class="card-title">{{ experience.title }}</h3>
      <div class="card-tags">
        <span class="tag tag-origin">{{ experience.origin }}</span>
        <span class="tag tag-method">{{ experience.methodology }}</span>
      </div>
      <p class="card-summary">{{ experience.summary }}</p>
      <div class="card-footer-info">
        <span class="card-scope">{{ experience.scope }}</span>
        <span class="card-year">{{ experience.year }}</span>
      </div>
    </div>

    <div class="card-back" [style.--card-color]="experience.color">
      <h4 class="back-title">Resultados destacados</h4>
      <ul class="back-list">
        <li *ngFor="let r of experience.results">{{ r }}</li>
      </ul>
      <button class="detail-btn" (click)="onViewDetail()">Ver detalle completo →</button>
    </div>
  </div>
</div>
